{{define "title"}}Профиль — Magaz{{end}}
{{define "content"}}
<div class="container">
  <div class="account-layout">
    {{template "account-nav" .}}
    <div class="account-content">
      <h1 class="page-title">Мой профиль</h1>
      <div class="card">
        <form method="POST" action="/account">
          {{.CSRF}}
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" type="email" value="{{.User.Email}}" disabled>
          </div>
          <div class="form-group">
            <label class="form-label" for="name">Имя</label>
            <input id="name" class="form-input" type="text" name="name" value="{{.User.Name}}" required minlength="2" maxlength="100">
          </div>
          <button class="btn btn--primary mt-4" type="submit">Сохранить</button>
        </form>
      </div>
      <div class="card mt-6">
        <h2 class="card__title">Изменение пароля</h2>
        <form method="POST" action="/account/password">
          {{.CSRF}}
          <div class="form-group">
            <label class="form-label" for="old_password">Текущий пароль</label>
            <input id="old_password" class="form-input" type="password" name="old_password" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="new_password">Новый пароль</label>
            <input id="new_password" class="form-input" type="password" name="new_password" required minlength="8" placeholder="Не менее 8 символов">
          </div>
          <div class="form-group">
            <label class="form-label" for="confirm_password">Повторите новый пароль</label>
            <input id="confirm_password" class="form-input" type="password" name="confirm_password" required minlength="8">
          </div>
          <button class="btn btn--primary mt-4" type="submit">Изменить пароль</button>
        </form>
      </div>
    </div>
  </div>
</div>
{{end}}
