{{define "title"}}Адреса — Magaz{{end}}
{{define "content"}}
<div class="container">
  <div class="account-layout">
    {{template "account-nav" .}}
    <div class="account-content">
      <h1 class="page-title">Мои адреса</h1>
      <div class="addr-list">
        {{range .Data}}
        <div class="addr-card {{if .IsDefault}}addr-card--default{{end}}">
          <div class="addr-card__label">{{.Label}} {{if .IsDefault}}<span class="badge badge--blue">По умолчанию</span>{{end}}</div>
          <div class="addr-card__text">{{addrFull .}}</div>
          <form method="POST" action="/account/addresses/delete?id={{.ID}}" class="addr-card__del">
            {{$.CSRF}}
            <button class="btn btn--sm btn--danger" type="submit" onclick="return confirm('Удалить адрес?')">Удалить</button>
          </form>
        </div>
        {{else}}
          <div class="empty-state"><p>Адресов нет</p></div>
        {{end}}
      </div>

      <div class="card mt-6">
        <h2 class="card__title">Добавить адрес</h2>
        <form method="POST" action="/account/addresses">
          {{.CSRF}}
          <div class="form-group">
            <label class="form-label" for="label">Название (Дом, Работа…)</label>
            <input id="label" class="form-input" type="text" name="label" placeholder="Домашний">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="city">Город</label>
              <input id="city" class="form-input" type="text" name="city" required placeholder="Москва">
            </div>
            <div class="form-group">
              <label class="form-label" for="zip">Индекс</label>
              <input id="zip" class="form-input" type="text" name="zip" required placeholder="101000">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="street">Улица, дом, квартира</label>
            <input id="street" class="form-input" type="text" name="street" required placeholder="ул. Ленина, д.1, кв.5">
          </div>
          <div class="form-group form-group--check">
            <input id="is_default" type="checkbox" name="is_default">
            <label for="is_default">Сделать по умолчанию</label>
          </div>
          <button class="btn btn--primary mt-4" type="submit">Добавить адрес</button>
        </form>
      </div>
    </div>
  </div>
</div>
{{end}}
