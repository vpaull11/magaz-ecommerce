{{define "title"}}Вход — Magaz{{end}}
{{define "content"}}
<div class="auth-wrap">
  <div class="auth-card">
    <h1 class="auth-card__title">Вход в аккаунт</h1>
    {{with .Data}}
      {{if .error}}<div class="alert alert--error">{{.error}}</div>{{end}}
    {{end}}
    <form method="POST" action="/auth/login" novalidate>
      {{.CSRF}}
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input id="email" class="form-input" type="email" name="email"
               value="{{with .Data}}{{.email}}{{end}}"
               placeholder="you@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Пароль</label>
        <input id="password" class="form-input" type="password" name="password"
               placeholder="Ваш пароль" required>
      </div>
      <div class="form-group form-group--row">
        <a href="/auth/forgot" class="link-sm">Забыли пароль?</a>
      </div>
      <button class="btn btn--primary btn--full mt-4" type="submit">Войти</button>
    </form>
    <p class="auth-card__footer">Нет аккаунта? <a href="/auth/register">Зарегистрироваться</a></p>
  </div>
</div>
{{end}}
